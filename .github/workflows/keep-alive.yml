name: Keep Supabase Alive

on:
  schedule:
    # 每周一早上 09:00 (以你目前系統的 UTC-4 時區計算，對應 UTC 13:00) 執行一次
    # 如果是台灣時間 (UTC+8) 的早上 09:00，請改為 '0 1 * * 1'
    - cron: '0 13 * * 1'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  ping-db:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://lvspugkfgaxtfidzlqrc.supabase.co/rest/v1/words?limit=1" \
            -H "apikey: sb_publishable_ukYYuq9mlAVGjuoi8kQTxg_xpYHlzCu" \
            -H "Authorization: Bearer sb_publishable_ukYYuq9mlAVGjuoi8kQTxg_xpYHlzCu"
